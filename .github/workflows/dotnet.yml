name: .NET 8 CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore TravelManagement.Api/TravelManagement.Api.csproj

    - name: Build
      run: dotnet build TravelManagement.Api/TravelManagement.Api.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish TravelManagement.Api/TravelManagement.Api.csproj -c Release -o ./publish
